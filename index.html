<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CBSE Study Planner 2025–26</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #F8F7F4;
    --surface:   #FFFFFF;
    --dark:      #0F172A;
    --dark2:     #1E293B;
    --slate:     #475569;
    --muted:     #94A3B8;
    --border:    #E2E8F0;
    --gold:      #FCD34D;
    --gold-soft: #FEF9C3;

    --math:      #2563EB;
    --math-bg:   #EFF6FF;
    --math-bd:   #BFDBFE;
    --phys:      #7C3AED;
    --phys-bg:   #F5F3FF;
    --phys-bd:   #DDD6FE;
    --chem:      #059669;
    --chem-bg:   #ECFDF5;
    --chem-bd:   #A7F3D0;
    --eng:       #D97706;
    --eng-bg:    #FFFBEB;
    --eng-bd:    #FDE68A;
    --bio:       #DC2626;
    --bio-bg:    #FEF2F2;
    --bio-bd:    #FECACA;
    --psy:       #BE185D;
    --psy-bg:    #FDF2F8;
    --psy-bd:    #FBCFE8;

    --radius-sm:  6px;
    --radius-md:  10px;
    --radius-lg:  14px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.07);
    --shadow-md: 0 4px 12px rgba(0,0,0,.10);

    --font-display: 'Playfair Display', Georgia, serif;
    --font-body:    'Source Serif 4', Georgia, serif;
    --font-mono:    'JetBrains Mono', monospace;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout wrapper ─────────────────────────────────── */
  .app-wrap {
    max-width: 860px;
    margin: 0 auto;
    background: var(--bg);
    min-height: 100vh;
  }

  /* ── HEADER ─────────────────────────────────────────── */
  .header {
    background: var(--dark);
    color: #F8FAFC;
    padding: 28px 24px 22px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(251,191,36,.07);
    pointer-events: none;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: 40px;
    width: 90px; height: 90px;
    border-radius: 50%;
    background: rgba(124,58,237,.05);
    pointer-events: none;
  }
  .header-kicker {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .header h1 {
    font-family: var(--font-display);
    font-size: clamp(22px, 4vw, 30px);
    font-weight: 800;
    line-height: 1.15;
    color: #F1F5F9;
    margin-bottom: 6px;
  }
  .header p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* ── TABS ────────────────────────────────────────────── */
  .tabs {
    display: flex;
    background: var(--dark2);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid #334155;
  }
  .tab-btn {
    flex: 1;
    padding: 13px 6px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 400;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
    white-space: nowrap;
  }
  .tab-btn.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
    font-weight: 700;
  }
  .tab-btn:hover:not(.active) { color: #CBD5E1; }

  /* ── CONTENT ─────────────────────────────────────────── */
  .content {
    padding: 20px 18px 48px;
  }

  /* ── SECTION LABEL ───────────────────────────────────── */
  .section-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #64748B;
    margin-bottom: 12px;
    margin-top: 6px;
  }

  /* ── CARDS ───────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    margin-bottom: 10px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
  }
  .card-dark {
    background: var(--dark);
    color: #F1F5F9;
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    margin-bottom: 18px;
  }
  .card-dark .kicker {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--gold);
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .card-dark h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .card-dark p  { font-size: 12px; color: var(--muted); }

  /* ── PROGRESS BAR ────────────────────────────────────── */
  .progress-row { margin-bottom: 12px; }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 5px;
    color: #374151;
  }
  .progress-meta strong { font-family: var(--font-mono); font-size: 12px; color: var(--dark); }
  .progress-track {
    background: #E2E8F0;
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 4px;
    transition: width .5s ease;
  }

  /* ── PRIORITY SUBJECT CARDS ──────────────────────────── */
  .subject-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .subject-row .left { display: flex; align-items: center; gap: 10px; }
  .subject-row .icon { font-size: 20px; }
  .subject-row .name { font-weight: 700; font-size: 14px; color: var(--dark); }
  .subject-row .meta { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .pill {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }

  /* ── INFO BOXES ──────────────────────────────────────── */
  .info-box {
    border-radius: var(--radius-md);
    padding: 14px 16px;
    margin-top: 14px;
  }
  .info-box h4 { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
  .info-box p, .info-box li { font-size: 12px; line-height: 1.7; }
  .info-box ol { padding-left: 18px; }
  .info-box ol li { margin-bottom: 3px; }

  /* ── DAILY ROUTINE ───────────────────────────────────── */
  .routine-item {
    border-radius: var(--radius-sm);
    padding: 11px 13px;
    margin-bottom: 6px;
    border-left: 3px solid #CBD5E1;
    background: var(--surface);
    display: flex;
    gap: 11px;
    align-items: center;
    box-shadow: var(--shadow-sm);
    transition: transform .1s;
  }
  .routine-item:hover { transform: translateX(2px); }
  .routine-item.is-break { background: #F8FAFC; opacity: .78; box-shadow: none; }
  .routine-item .ri-icon { font-size: 16px; flex-shrink: 0; }
  .routine-item .ri-time {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .routine-item .ri-task { font-size: 12px; color: #1E293B; font-weight: 500; }
  .routine-item.is-break .ri-task { color: #64748B; font-weight: 400; }

  /* ── WEEKLY THEMES ───────────────────────────────────── */
  .week-row {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 8px;
  }
  .day-badge {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    color: #fff;
    min-width: 38px;
    text-align: center;
    flex-shrink: 0;
  }
  .week-row span { font-size: 13px; color: #374151; }

  /* ── SUBJECT PILLS (Chapters tab) ────────────────────── */
  .pill-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
  .subj-pill {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid transparent;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font-body);
    transition: background .15s, color .15s;
  }

  /* ── SUBJECT HEADER ──────────────────────────────────── */
  .subj-header {
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    margin-bottom: 14px;
    border: 1px solid var(--border);
  }
  .subj-header h2 { font-size: 20px; font-weight: 700; margin-bottom: 5px; }
  .subj-header .sh-meta { font-size: 12px; color: #374151; margin-bottom: 8px; }
  .subj-header .sh-tip {
    font-size: 12px;
    color: #374151;
    font-style: italic;
    line-height: 1.7;
    margin-top: 10px;
  }

  .practicals-banner {
    background: var(--dark);
    color: var(--gold);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-bottom: 14px;
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1.5;
  }

  /* ── CHAPTER CARDS ───────────────────────────────────── */
  .chapter-card {
    background: var(--surface);
    border-radius: var(--radius-md);
    padding: 13px 14px;
    margin-bottom: 9px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .chapter-card .cc-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 7px;
    gap: 8px;
    flex-wrap: wrap;
  }
  .cc-wk {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 20px;
    color: #fff;
  }
  .cc-cls {
    font-size: 10px;
    background: #F1F5F9;
    color: #64748B;
    padding: 2px 9px;
    border-radius: 10px;
    font-weight: 600;
    font-family: var(--font-mono);
  }
  .cc-topic {
    font-size: 13px;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 5px;
    line-height: 1.4;
  }
  .cc-task { font-size: 11px; color: #475569; line-height: 1.55; }

  /* ── TIPS TAB ────────────────────────────────────────── */
  .accordion {
    background: var(--surface);
    border-radius: var(--radius-md);
    margin-bottom: 9px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .accordion-btn {
    width: 100%;
    padding: 13px 15px;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--font-body);
    text-align: left;
  }
  .accordion-btn .acc-left { display: flex; gap: 11px; align-items: center; }
  .accordion-btn .acc-icon { font-size: 20px; }
  .accordion-btn .acc-name { font-size: 13px; font-weight: 700; }
  .accordion-btn .acc-teacher { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .accordion-btn .acc-arrow { color: var(--muted); font-size: 14px; transition: transform .2s; }
  .accordion-btn.open .acc-arrow { transform: rotate(180deg); }
  .accordion-body {
    display: none;
    padding: 0 15px 15px;
    border-top: 1px solid var(--border);
  }
  .accordion-body.open { display: block; }
  .accordion-body .tip-text {
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 12px;
    color: #374151;
    line-height: 1.75;
    margin-top: 12px;
  }

  .general-tip {
    display: flex;
    gap: 13px;
    background: var(--surface);
    padding: 14px 15px;
    border-radius: var(--radius-md);
    margin-bottom: 8px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .general-tip .gt-icon { font-size: 22px; flex-shrink: 0; }
  .general-tip .gt-title { font-size: 12px; font-weight: 700; color: var(--dark); margin-bottom: 3px; }
  .general-tip .gt-text  { font-size: 12px; color: #475569; line-height: 1.65; }

  /* Assessment Summary */
  .assessment-box {
    background: var(--dark);
    border-radius: var(--radius-lg);
    padding: 18px;
    margin-top: 18px;
  }
  .assessment-box h4 {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--gold);
    margin-bottom: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .assess-row { margin-bottom: 10px; }
  .assess-row .ar-subj {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--gold);
    margin-bottom: 2px;
  }
  .assess-row .ar-marks { font-size: 11px; color: var(--muted); line-height: 1.5; }

  /* ── RESPONSIVE ──────────────────────────────────────── */
  @media (min-width: 600px) {
    .content { padding: 24px 26px 60px; }
    .header  { padding: 34px 30px 26px; }
    .tab-btn { font-size: 14px; padding: 14px 10px; }
    .routine-item .ri-task { font-size: 13px; }
    .cc-topic { font-size: 14px; }
    .chapter-card { padding: 15px 16px; }
  }

  @media (min-width: 860px) {
    .app-wrap {
      box-shadow: 0 0 0 1px #E2E8F0, 0 8px 40px rgba(0,0,0,.08);
      min-height: 100vh;
    }
    body { background: #EDECE8; padding: 32px 16px; }
    .tabs { border-radius: 0; }
    .header h1 { font-size: 32px; }
    .content { padding: 28px 32px 70px; }

    /* Two-column chapter cards on large screens */
    .chapter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .chapter-grid .chapter-card { margin-bottom: 0; }

    /* Two-column overview grid */
    .overview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    .overview-grid .card { margin-bottom: 0; }

    /* Side-by-side daily + weekly on desktop */
    .daily-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 22px;
      align-items: start;
    }
  }

  /* ── UTILITIES ───────────────────────────────────────── */
  .mt-16 { margin-top: 16px; }
  .mt-20 { margin-top: 20px; }
  .mb-0  { margin-bottom: 0; }

  /* Smooth fade on tab switch */
  .tab-panel { animation: fadeIn .2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  /* Hover lift on cards */
  .chapter-card:hover, .card:hover { box-shadow: var(--shadow-md); }
</style>
</head>

<div class="app-wrap">

  <header class="header">

  <!-- TABS -->
  <nav class="tabs" id="nav-tabs">

    <button class="tab-btn"        data-tab="chapters">Chapters</button>
    <button class="tab-btn"        data-tab="tips">Tips</button>
  </nav>

  <!-- CONTENT -->
  <main class="content" id="main-content"></main>

</div>

function renderChapters() {
  const s = SUBJECTS[activeSubject];

  const pills = Object.keys(SUBJECTS).map(k => {
    const sub = SUBJECTS[k];

      style="border-color:${sub.color}; background:${active ? sub.color : 'transparent'}; color:${active ? '#fff' : sub.color};">
      ${sub.icon} ${sub.label}
    </button>`;
  }).join('');

  const schedule = s.schedule.map(item => `
    <div class="chapter-card" style="border-color:${s.bd};">
      <div class="cc-header">
        <div style="display:flex; gap:7px; align-items:center; flex-wrap:wrap;">
          <span class="cc-wk" style="background:${s.color};">Wk ${item.weeks}</span>
          <span class="cc-cls">Class ${item.cls}</span>
        </div>
      </div>
      <div class="cc-topic">${item.topic}</div>
      <div class="cc-task">✏️ ${item.task}</div>
    </div>`).join('');

  return `
    <div class="tab-panel">
      <div class="pill-row">${pills}</div>

      <div class="subj-header" style="background:${s.bg}; border-color:${s.bd};">
        <h2 style="color:${s.color};">${s.icon} ${s.label}</h2>
        <div class="sh-meta">👩‍🏫 ${s.teacher} &nbsp;·&nbsp; 📅 ${s.deadline}</div>
        <div class="sh-tip">"${s.tip}"</div>

      <div class="practicals-banner">🔬 PRACTICALS: ${s.practicals}</div>

      <div class="section-label">Week-by-Week Chapter Plan</div>
      <div class="chapter-grid">${schedule}</div>
    </div>`;

    const s = SUBJECTS[k];
    const isOpen = openAccordion === k;
    return `
      <div class="accordion" style="border-color:${s.bd};">
        <button class="accordion-btn${isOpen ? ' open' : ''}" data-acc="${k}">
          <div class="acc-left">
            <span class="acc-icon">${s.icon}</span>
            <div>
              <div class="acc-name" style="color:${s.color};">${s.label}</div>
              <div class="acc-teacher">${s.teacher}</div>
            </div>
          </div>
          <span class="acc-arrow">▼</span>
        </button>
        <div class="accordion-body${isOpen ? ' open' : ''}">
          <div class="tip-text" style="background:${s.bg};">${s.tip}</div>
        </div>
      </div>`;
  }).join('');

  const generalTips = GENERAL_TIPS.map(t => `
    <div class="general-tip">
      <span class="gt-icon">${t.icon}</span>
      <div>
        <div class="gt-title">${t.title}</div>
        <div class="gt-text">${t.tip}</div>
      </div>
    </div>`).join('');

  const assessRows = [
    ["Mathematics","Periodic Tests (Best 2/3) = 10M · Activities = 10M"],
    ["Physics",    "Periodic Tests = 10M · Practicals = 30M"],
    ["Chemistry",  "Periodic Tests = 10M · Practicals = 30M"],
    ["English",    "Listening + Speaking = 10M · Project = 10M"],
    ["Biology",    "Periodic Tests = 10M · Practicals = 30M"],
    ["Psychology", "Experiments + Project + Viva = 30M"],
  ].map(([subj, marks]) => `
    <div class="assess-row">
      <div class="ar-subj">${subj}</div>
      <div class="ar-marks">${marks}</div>
    </div>`).join('');

  return `
    <div class="tab-panel">
      <div class="section-label">Teacher Tips by Subject</div>
      ${accordions}

      <div class="section-label mt-20">General Study Principles</div>
      ${generalTips}

      <div class="assessment-box">
        <h4>⚠️ Internal Assessment Summary</h4>
        ${assessRows}
      </div>
    </div>`;
}

/* ─────────────────── RENDER ENGINE ─────────────────────── */
function render() {
  const main = document.getElementById('main-content');
  switch (activeTab) {
    case 'overview': main.innerHTML = renderOverview(); break;
    case 'daily':    main.innerHTML = renderDaily();    break;
    case 'chapters': main.innerHTML = renderChapters(); break;
    case 'tips':     main.innerHTML = renderTips();     break;
  }
  attachListeners();
}

function attachListeners() {
  /* Subject pills */
  document.querySelectorAll('.subj-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      activeSubject = btn.dataset.subj;
      render();
    });
  });

  /* Accordion */
  document.querySelectorAll('.accordion-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.acc;
      openAccordion = openAccordion === key ? null : key;
      render();
    });
  });
}

/* ─────────────────── TAB NAV ───────────────────────────── */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeTab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    openAccordion = null;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    render();
  });
});

/* ─────────────────── INIT ──────────────────────────────── */
render();
</script>
