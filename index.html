<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CBSE Study Planner 2025–26</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #F2F2EF;
  --surface: #FFFFFF;
  --dark:    #0F172A;
  --dark2:   #1E293B;
  --muted:   #94A3B8;
  --border:  #E2E8F0;
  --gold:    #FCD34D;
  --radius:  14px;
  --shadow:  0 2px 10px rgba(0,0,0,.07);
  --shadow-lg: 0 6px 20px rgba(0,0,0,.11);
  --ff-disp: 'Playfair Display', Georgia, serif;
  --ff-body: 'Source Serif 4', Georgia, serif;
  --ff-mono: 'JetBrains Mono', monospace;
}

html { scroll-behavior: smooth; }
body {
  font-family: var(--ff-body);
  background: var(--bg);
  color: var(--dark);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── WRAPPER ── */
.wrap { max-width: 860px; margin: 0 auto; background: var(--bg); min-height: 100vh; }

/* ── HEADER ── */
.hdr {
  background: var(--dark);
  color: #F8FAFC;
  padding: 28px 22px 22px;
  position: relative;
  overflow: hidden;
}
.hdr::before {
  content:''; position:absolute; top:-30px; right:-30px;
  width:160px; height:160px; border-radius:50%;
  background:rgba(251,191,36,.07);
}
.hdr-k {
  font-family: var(--ff-mono);
  font-size: 10px; letter-spacing: 3px;
  text-transform: uppercase; color: var(--gold);
  margin-bottom: 8px;
}
.hdr h1 {
  font-family: var(--ff-disp);
  font-size: clamp(22px,4vw,30px);
  font-weight: 800; line-height: 1.15;
  color: #F1F5F9; margin-bottom: 6px;
}
.hdr p { font-size: 13px; color: var(--muted); }

/* ── TABS ── */
.tabs {
  display: flex; background: var(--dark2);
  position: sticky; top: 0; z-index: 100;
  border-bottom: 1px solid #334155;
}
.tab-btn {
  flex: 1; padding: 14px 6px;
  border: none; background: transparent;
  cursor: pointer; font-family: var(--ff-body);
  font-size: 13px; font-weight: 400;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
}
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); font-weight: 700; }
.tab-btn:hover:not(.active) { color: #CBD5E1; }

/* ── CONTENT ── */
.content { padding: 20px 16px 60px; }

/* ── SECTION LABEL ── */
.slabel {
  font-family: var(--ff-mono);
  font-size: 9px; letter-spacing: 2.5px;
  text-transform: uppercase; color: #64748B;
  margin-bottom: 12px; margin-top: 6px;
}

/* ── DARK CARD ── */
.dark-card {
  background: var(--dark); color: #F1F5F9;
  border-radius: var(--radius);
  padding: 16px 18px; margin-bottom: 18px;
}
.dark-card .kicker {
  font-family: var(--ff-mono); font-size: 10px;
  letter-spacing: 1.5px; color: var(--gold);
  margin-bottom: 6px; text-transform: uppercase;
}
.dark-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.dark-card p  { font-size: 12px; color: var(--muted); }

/* ── OVERVIEW: subject row ── */
.card {
  background: var(--surface); border-radius: var(--radius);
  padding: 14px 16px; margin-bottom: 9px;
  box-shadow: var(--shadow); border: 1px solid var(--border);
  transition: box-shadow .15s;
}
.card:hover { box-shadow: var(--shadow-lg); }
.srow { display: flex; justify-content: space-between; align-items: center; }
.srow .left { display: flex; align-items: center; gap: 10px; }
.srow .sicon { font-size: 20px; }
.srow .sname { font-weight: 700; font-size: 14px; color: var(--dark); }
.srow .smeta { font-size: 11px; color: var(--muted); margin-top: 3px; }
.pill {
  font-family: var(--ff-mono); font-size: 10px;
  font-weight: 700; padding: 3px 10px; border-radius: 20px;
}

/* ── PROGRESS ── */
.prog-row { margin-bottom: 12px; }
.prog-meta { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; color: #374151; }
.prog-meta strong { font-family: var(--ff-mono); font-size: 12px; color: var(--dark); }
.prog-track { background: #E2E8F0; border-radius: 4px; height: 6px; overflow: hidden; }
.prog-fill  { height: 100%; border-radius: 4px; transition: width .5s ease; }

/* ── INFO BOX ── */
.ibox { border-radius: var(--radius); padding: 14px 16px; margin-top: 14px; }
.ibox h4 { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
.ibox p  { font-size: 12px; line-height: 1.7; }
.ibox ol { padding-left: 18px; }
.ibox ol li { font-size: 12px; line-height: 1.7; margin-bottom: 3px; }

/* ──────────────────────────────────────────────
   DAILY ROUTINE — large cards matching screenshot
─────────────────────────────────────────────── */
.ri {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 10px;
  border-left: 4px solid #CBD5E1;
  display: flex;
  gap: 16px;
  align-items: center;
  box-shadow: var(--shadow);
  transition: transform .15s, box-shadow .15s;
}
.ri:hover { transform: translateX(3px); box-shadow: var(--shadow-lg); }
.ri.brk   { background: #F1F5F9; opacity: .82; box-shadow: none; border-left-color: #CBD5E1 !important; }
.ri .ri-ico  { font-size: 30px; flex-shrink: 0; line-height: 1; }
.ri .ri-time {
  font-family: var(--ff-mono);
  font-size: 13px; font-weight: 700;
  margin-bottom: 4px; letter-spacing: .3px;
}
.ri .ri-task { font-size: 15px; color: #1E293B; font-weight: 500; line-height: 1.35; }
.ri.brk .ri-time { color: var(--muted) !important; }
.ri.brk .ri-task { color: var(--muted); font-weight: 400; }

/* ──────────────────────────────────────────────
   WEEKLY THEMES — large rounded-square badges
─────────────────────────────────────────────── */
.wrow {
  display: flex; gap: 14px; align-items: center; margin-bottom: 12px;
}
.day-badge {
  font-family: var(--ff-body);
  font-size: 15px; font-weight: 700;
  padding: 10px 0; border-radius: 12px;
  color: #fff; width: 72px; text-align: center; flex-shrink: 0;
}
.wrow .wtheme { font-size: 15px; color: #374151; }

/* ── DAILY layout (desktop side-by-side) ── */
@media (min-width: 860px) {
  .daily-layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 24px;
    align-items: start;
  }
}

/* ── CHAPTERS ── */
.pill-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
.spill {
  padding: 6px 14px; border-radius: 20px;
  border: 1.5px solid; font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: var(--ff-body);
  transition: background .15s, color .15s;
}
.subj-hdr {
  border-radius: var(--radius); padding: 16px 18px;
  margin-bottom: 14px; border: 1px solid;
}
.subj-hdr h2 { font-size: 20px; font-weight: 700; margin-bottom: 5px; }
.subj-hdr .sh-meta { font-size: 12px; color: #374151; margin-bottom: 8px; }
.subj-hdr .sh-tip  { font-size: 12px; color: #374151; font-style: italic; line-height: 1.7; margin-top: 10px; }
.prac-banner {
  background: var(--dark); color: var(--gold);
  border-radius: 8px; padding: 10px 14px;
  margin-bottom: 14px; font-family: var(--ff-mono);
  font-size: 11px; line-height: 1.5;
}
.ch-grid { display: grid; gap: 9px; }
@media (min-width: 860px) { .ch-grid { grid-template-columns: 1fr 1fr; } }
.ch-card {
  background: var(--surface); border-radius: var(--radius);
  padding: 14px 15px; border: 1px solid;
  box-shadow: var(--shadow); transition: box-shadow .15s;
}
.ch-card:hover { box-shadow: var(--shadow-lg); }
.ch-card .cc-top { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; margin-bottom: 7px; }
.cc-wk  { font-family: var(--ff-mono); font-size: 10px; font-weight: 700; padding: 2px 10px; border-radius: 20px; color: #fff; }
.cc-cls { font-family: var(--ff-mono); font-size: 10px; font-weight: 600; padding: 2px 9px; border-radius: 10px; background: #F1F5F9; color: #64748B; }
.cc-topic { font-size: 13px; font-weight: 700; color: var(--dark); margin-bottom: 5px; line-height: 1.4; }
.cc-task  { font-size: 11px; color: #475569; line-height: 1.55; }

/* ── TIPS ── */
.accord {
  background: var(--surface); border-radius: var(--radius);
  margin-bottom: 9px; overflow: hidden; border: 1px solid;
}
.accord-btn {
  width: 100%; padding: 14px 16px;
  border: none; background: transparent;
  cursor: pointer; display: flex;
  justify-content: space-between; align-items: center;
  font-family: var(--ff-body); text-align: left;
}
.acc-left { display: flex; gap: 11px; align-items: center; }
.acc-ico  { font-size: 20px; }
.acc-name { font-size: 13px; font-weight: 700; }
.acc-teacher { font-size: 10px; color: var(--muted); margin-top: 1px; }
.acc-arr  { color: var(--muted); font-size: 13px; transition: transform .2s; }
.accord-btn.open .acc-arr { transform: rotate(180deg); }
.accord-body { display: none; padding: 0 15px 15px; border-top: 1px solid var(--border); }
.accord-body.open { display: block; }
.tip-text { border-radius: 8px; padding: 12px 14px; font-size: 12px; color: #374151; line-height: 1.75; margin-top: 12px; }
.gtip { display: flex; gap: 13px; background: var(--surface); padding: 14px 15px; border-radius: var(--radius); margin-bottom: 8px; border: 1px solid var(--border); box-shadow: var(--shadow); }
.gtip .gico  { font-size: 22px; flex-shrink: 0; }
.gtip .gtit  { font-size: 12px; font-weight: 700; color: var(--dark); margin-bottom: 3px; }
.gtip .gtxt  { font-size: 12px; color: #475569; line-height: 1.65; }
.assess-box  { background: var(--dark); border-radius: var(--radius); padding: 18px; margin-top: 18px; }
.assess-box h4 { font-family: var(--ff-mono); font-size: 12px; color: var(--gold); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 1px; }
.ar { margin-bottom: 10px; }
.ar .as { font-family: var(--ff-mono); font-size: 11px; color: var(--gold); margin-bottom: 2px; }
.ar .am { font-size: 11px; color: var(--muted); line-height: 1.5; }

/* ── RESPONSIVE ── */
@media (min-width: 600px) {
  .content { padding: 24px 26px 60px; }
  .hdr { padding: 34px 30px 26px; }
  .tab-btn { font-size: 14px; }
}
@media (min-width: 860px) {
  body { background: #DBDAD5; padding: 32px 16px; }
  .wrap { box-shadow: 0 0 0 1px #E2E8F0, 0 8px 40px rgba(0,0,0,.10); min-height: auto; }
  .content { padding: 28px 32px 70px; }
  .hdr h1 { font-size: 32px; }
}

/* ── ANIMATION ── */
.panel { animation: fadeUp .22s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>

  <main class="content" id="app"></main>
</div>

function Overview() {
  const pri = ['mathematics','physics','chemistry','english'];

    const s = SUBJECTS[k];

      <div class="srow">

function Daily() {

function Chapters() {
  const s = SUBJECTS[SUBJ];

    const sub = SUBJECTS[k], active = k===SUBJ;
    return `<button class="spill" data-subj="${k}"
      style="border-color:${sub.color};background:${active?sub.color:'transparent'};color:${active?'#fff':sub.color}">
      ${sub.icon} ${sub.label}</button>`;
  }).join('');
  const cards = s.schedule.map(it => `
    <div class="ch-card" style="border-color:${s.bd}">
      <div class="cc-top">
        <span class="cc-wk" style="background:${s.color}">Wk ${it.weeks}</span>
        <span class="cc-cls">Class ${it.cls}</span>
      </div>
      <div class="cc-topic">${it.topic}</div>
      <div class="cc-task">✏️ ${it.task}</div>
    </div>`).join('');
  return `<div class="panel">
    <div class="pill-row">${pills}</div>
    <div class="subj-hdr" style="background:${s.bg};border-color:${s.bd}">
      <h2 style="color:${s.color}">${s.icon} ${s.label}</h2>
      <div class="sh-meta">👩‍🏫 ${s.teacher} &nbsp;·&nbsp; 📅 ${s.deadline}</div>
      <div class="sh-tip">"${s.tip}"</div>
    </div>
    <div class="prac-banner">🔬 PRACTICALS: ${s.practicals}</div>
    <div class="slabel">Week-by-Week Chapter Plan</div>
    <div class="ch-grid">${cards}</div>
  </div>`;
}

function Tips() {

    const s = SUBJECTS[k], open = ACCORD===k;
    return `<div class="accord" style="border-color:${s.bd}">
      <button class="accord-btn${open?' open':''}" data-acc="${k}">
        <div class="acc-left">
          <span class="acc-ico">${s.icon}</span>
          <div><div class="acc-name" style="color:${s.color}">${s.label}</div><div class="acc-teacher">${s.teacher}</div></div>
        </div>
        <span class="acc-arr">▼</span>
      </button>
      <div class="accord-body${open?' open':''}">
        <div class="tip-text" style="background:${s.bg}">${s.tip}</div>
      </div>
    </div>`;
  }).join('');
  const gtips = GTIPS.map(t => `
    <div class="gtip">
      <span class="gico">${t.icon}</span>
      <div><div class="gtit">${t.title}</div><div class="gtxt">${t.tip}</div></div>
    </div>`).join('');
  const assess = [
    ["Mathematics","Periodic Tests (Best 2/3) = 10M · Activities = 10M"],
    ["Physics",    "Periodic Tests = 10M · Practicals = 30M"],
    ["Chemistry",  "Periodic Tests = 10M · Practicals = 30M"],
    ["English",    "Listening + Speaking = 10M · Project = 10M"],
    ["Biology",    "Periodic Tests = 10M · Practicals = 30M"],
    ["Psychology", "Experiments + Project + Viva = 30M"],
  ].map(([s,m]) => `<div class="ar"><div class="as">${s}</div><div class="am">${m}</div></div>`).join('');
  return `<div class="panel">
    <div class="slabel">Teacher Tips by Subject</div>${accords}
    <div class="slabel" style="margin-top:20px">General Study Principles</div>${gtips}
    <div class="assess-box"><h4>⚠️ Internal Assessment Summary</h4>${assess}</div>
  </div>`;
}

/* ════════════════════════════════════════
   ENGINE
════════════════════════════════════════ */
function render() {
  const app = document.getElementById('app');
  if (TAB==='overview') app.innerHTML = Overview();
  if (TAB==='daily')    app.innerHTML = Daily();
  if (TAB==='chapters') app.innerHTML = Chapters();
  if (TAB==='tips')     app.innerHTML = Tips();
  bindEvents();
}

function bindEvents() {
  document.querySelectorAll('[data-subj]').forEach(b =>
    b.addEventListener('click', () => { SUBJ = b.dataset.subj; render(); }));
  document.querySelectorAll('[data-acc]').forEach(b =>
    b.addEventListener('click', () => { ACCORD = ACCORD===b.dataset.acc ? null : b.dataset.acc; render(); }));
}

document.querySelectorAll('.tab-btn').forEach(b => {
  b.addEventListener('click', () => {
    TAB = b.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    ACCORD = null;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    render();
  });
});

render();
</script>
